name: Build and Deploy Resume PDFs

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # --- SECRETS (Masked PII) ---
      RESUME_PHONE: ${{ secrets.RESUME_PHONE }}
      RESUME_EMAIL: ${{ secrets.RESUME_EMAIL }}

      # --- VARIABLES (Configuration) ---
      RESUME_FIRST_NAME: ${{ vars.RESUME_FIRST_NAME }}
      RESUME_LAST_NAME: ${{ vars.RESUME_LAST_NAME }}
      RESUME_TITLE: ${{ vars.RESUME_TITLE }}
      RESUME_LOCATION: ${{ vars.RESUME_LOCATION }}
      RESUME_GITHUB_USER: ${{ vars.RESUME_GITHUB_USER }}
      RESUME_LINKEDIN: ${{ vars.RESUME_LINKEDIN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache TeX Live
        uses: actions/cache@v3
        id: cache-tex
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-texlive-${{ hashFiles('**/*.tex') }}
          restore-keys: |
            ${{ runner.os }}-texlive-

      - name: Install Dependencies
        run: npm install

      - name: Install Pandoc, LaTeX, and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            fontconfig \
            fonts-liberation \
            fonts-dejavu

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Prepare Directories
        run: |
          mkdir -p pdf temp_processed markdown
          rm -f pdf/*.pdf
          rm -f markdown/*.md

      - name: Copy Source to Temp
        run: cp src/*.md temp_processed/

      - name: Process Markdown (Inject Links & Stats)
        run: |
          node scripts/update-stats.js temp_processed
          node scripts/inject-links.js temp_processed

      - name: Publish Safe Markdown to Distribution
        run: |
          NAME_PREFIX=$(node scripts/get-name.js)

          for file_path in temp_processed/*.md; do
            file_name=$(basename "$file_path")
            new_file_name="${NAME_PREFIX}_${file_name}"
            
            echo "Assembling Safe Markdown for $new_file_name..."
            node scripts/assemble.js markdown "temp_processed/$file_name" "$new_file_name" --safe
          done

      - name: Assemble Resumes with PII Headers
        run: |
          for file_path in temp_processed/*.md; do
            file_name=$(basename "$file_path")
            echo "Assembling $file_name..."
            node scripts/assemble.js temp_processed "temp_processed/$file_name" "$file_name"
          done

      - name: Render Mermaid Diagrams
        run: |
          for f in temp_processed/*.md; do
            echo "Rendering diagrams for $f"
            node scripts/mermaid-render.js "$f"
          done

      - name: Render PDFs via render-pdf.js
        run: |
          RESUME_DIST_DIR=temp_processed \
          RESUME_PDF_DIR=pdf \
          RESUME_MAIN_FONT="Liberation Serif" \
          RESUME_SANS_FONT="Liberation Sans" \
          node scripts/render-pdf.js

      - name: Commit and Push Safe Markdown Only
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add markdown/

          git diff --staged --quiet || git commit -m "chore: update safe markdown distribution [skip ci]"

          git push

      - name: Generate Release Body
        run: |
          echo "BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          for f in pdf/*.pdf; do
            echo "- $(basename "$f")" >> $GITHUB_ENV
          done
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (${{ github.sha }})
          files: pdf/*.pdf
          body: |
            **Build Timestamp:** `${{ env.BUILD_DATE }}`
            **Commit SHA:** `${{ github.sha }}`

            ### 📄 Artifacts
            ${{ env.RELEASE_BODY }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDF Artifacts (Secure)
        uses: actions/upload-artifact@v4
        with:
          name: RyanBumstead_Resumes_PDF
          path: pdf/*.pdf
          retention-days: 90

      - name: Cleanup
        if: always()
        run: rm -rf temp_processed
